<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Рандомайзер | Просто для учителя</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ
           ========================================= */
        :root {
            --bg: #f4f7f6;
            --text: #333;
            --primary: #8a2be2;
            --panel: #fff;
            --border: #ddd;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent; overflow: hidden;
        }

        /* =========================================
           РЕДАКТОР
           ========================================= */
        #editor-container {
            display: none; background-color: var(--bg); color: var(--text);
            width: 100%; height: 100%; padding: 15px; box-sizing: border-box;
            overflow-y: auto; align-items: center; flex-direction: column;
        }
        .panel-box {
            max-width: 1100px; width: 100%; background: var(--panel);
            padding: 25px 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            box-sizing: border-box; margin-bottom: 20px;
        }
        h1 { text-align: center; margin: 0 0 20px; color: var(--primary); font-size: 26px; }
        .layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .controls { flex: 1.2; min-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .preview { flex: 1; min-width: 320px; display: flex; flex-direction: column; align-items: center; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 700; font-size: 14px; color: #444; }
        
        /* Список карточек */
        #card-list { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; padding-right: 5px; border: 1px solid #eee; padding: 10px; border-radius: 10px; }
        .card-item { display: flex; gap: 8px; align-items: center; background: #f9f9f9; padding: 8px; border-radius: 8px; border: 1px solid #eee; }
        .card-item input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
        .btn-add { background: #2ed573; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* Поиск картинок */
        .search-container { display: flex; gap: 5px; margin-top: 5px; }
        #pixabay-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; margin-top: 10px; max-height: 150px; overflow-y: auto; }
        #pixabay-results img { width: 100%; height: 60px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        #pixabay-results img:hover { border-color: var(--primary); transform: scale(0.95); }

        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; padding: 0;}
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        
        button.action-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        textarea.code-out { width: 100%; height: 70px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-family: monospace; font-size: 11px; background: #f4f7f6; resize: none; box-sizing: border-box;}

        .preview-box { width: 100%; max-width: 400px; aspect-ratio: 4/5; border: 2px dashed var(--border); border-radius: 20px; background: #eee; position: relative; overflow: hidden; resize: both; }
        .preview-box iframe { width: 100%; height: 100%; border: none; }

        footer { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); text-align: center; font-size: 13px; color: #777; width: 100%; max-width: 1100px; }
        .social-links { display: flex; gap: 20px; justify-content: center; margin-top: 10px; }
        .social-links a { color: #777; text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: 600; }
        .social-links svg { width: 18px; height: 18px; fill: currentColor; }

        /* =========================================
           ВИДЖЕТ
           ========================================= */
        #widget-container {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center; 
            padding: 2vmin; box-sizing: border-box; background: transparent;
            container-type: size;
        }
        .widget-card {
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 0.5cqmin solid rgba(255, 255, 255, 0.4); border-radius: 4cqmin;
            padding: 5cqmin; box-sizing: border-box;
            box-shadow: 0 2cqmin 6cqmin rgba(0,0,0,0.1), inset 0 1cqmin 2cqmin rgba(255,255,255,0.3);
            width: 100%; height: 100%;
        }
        .deck-area { position: relative; width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; perspective: 1500px; margin-bottom: 4cqmin; }
        .card { position: absolute; width: 55cqmin; height: 77cqmin; border-radius: 3cqmin; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); box-shadow: 0 2cqmin 4cqmin rgba(0,0,0,0.3); }
        .fake-card { position: absolute; width: 55cqmin; height: 77cqmin; border-radius: 3cqmin; background: #fff; box-shadow: 0 0.5cqmin 1cqmin rgba(0,0,0,0.2); }
        .fake-1 { transform: translate(-1cqmin, 1cqmin) rotate(-2deg); z-index: 1; }
        .fake-2 { transform: translate(1cqmin, 1.5cqmin) rotate(1deg); z-index: 2; }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 3cqmin; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 0.5cqmin solid rgba(255,255,255,0.8); background-color: #fff; padding: 2cqmin; box-sizing: border-box; }
        .face.front { background-color: var(--widget-color, #8a2be2); transform: rotateY(0deg); }
        .face.front::after { content: '?'; font-size: 20cqmin; color: rgba(255,255,255,0.8); font-weight: 900; }
        .face.back { transform: rotateY(180deg); background: #fff; text-align: center; font-size: 5cqmin; font-weight: bold; color: var(--text-color, #333); }
        .face.back img { width: 101%; height: 101%; object-fit: cover; }
        .card.flipped { transform: rotateY(180deg) scale(1.05); }
        .shuffling .fake-1 { animation: shuffleLeft 0.5s ease-in-out; }
        .shuffling .fake-2 { animation: shuffleRight 0.5s ease-in-out; }
        .shuffling .main-card { animation: shuffleTop 0.5s ease-in-out; }
        @keyframes shuffleLeft { 50% { transform: translate(-30cqmin, 5cqmin) rotate(-15deg); } }
        @keyframes shuffleRight { 50% { transform: translate(30cqmin, 0cqmin) rotate(10deg); } }
        @keyframes shuffleTop { 50% { transform: translateY(-15cqmin) scale(1.05); } }
        .btn-draw { background: var(--widget-color, #8a2be2); color: white; border: none; border-radius: 2cqmin; padding: 3cqmin 6cqmin; font-size: 4.5cqmin; font-weight: 800; cursor: pointer; box-shadow: 0 1.5cqmin 3cqmin rgba(0,0,0,0.2); transition: 0.2s; z-index: 10; }
        .btn-draw:disabled { opacity: 0.6; }
        .counter { position: absolute; top: 3cqmin; right: 4cqmin; background: rgba(0,0,0,0.5); color: #fff; padding: 1cqmin 2cqmin; border-radius: 2cqmin; font-size: 3cqmin; }
    </style>
</head>
<body>

<!-- =========================================
     РЕДАКТОР
     ========================================= -->
<div id="editor-container">
    <div class="panel-box">
        <h1>Рандомайзер</h1>
        <div class="layout">
            <div class="controls">
                
                <div class="control-group">
                    <label>Карточки (Текст или Ссылка)</label>
                    <div id="card-list"></div>
                    <button class="btn-add" onclick="addCardItem()">+ Добавить текст</button>
                </div>

                <div class="control-group">
                    <label>Библиотека картинок (Pixabay)</label>
                    <div class="search-container">
                        <input type="text" id="pixSearch" placeholder="Найти картинку (например: кот)..." style="flex:1; padding:8px; border-radius:5px; border:1px solid #ccc;">
                        <button onclick="searchImages()" style="padding:8px 15px; border-radius:5px; border:none; background:var(--primary); color:white; cursor:pointer;">Найти</button>
                    </div>
                    <div id="pixabay-results"></div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div class="control-group">
                        <label>Цвет рубашки</label>
                        <input type="color" id="colorPicker" value="#8a2be2">
                    </div>
                    <div class="control-group">
                        <label>Цвет текста</label>
                        <input type="color" id="textColorPicker" value="#333333">
                    </div>
                </div>
                
                <label class="checkbox-group">
                    <input type="checkbox" id="neonToggle" checked>
                    <span>Неоновое свечение</span>
                </label>
                
                <button id="copyBtn" class="action-btn">Скопировать код iframe</button>
                <textarea id="codeOutput" class="code-out" readonly></textarea>
            </div>
            
            <div class="preview">
                <label style="margin-bottom: 10px;">Предпросмотр</label>
                <div class="preview-box">
                    <iframe id="previewFrame" allowtransparency="true"></iframe>
                </div>
            </div>
        </div>

        <footer>
            <div>Автор: <b>Кóденцева Алёна</b>, блог <i>Easy for busy</i></div>
            <div class="social-links">
                <a href="https://t.me/easyfrbusy" target="_blank">Telegram</a>
                <a href="https://vk.com/easyfrbusy" target="_blank">ВКонтакте</a>
            </div>
        </footer>
    </div>
</div>

<!-- =========================================
     ВИДЖЕТ
     ========================================= -->
<div id="widget-container">
    <div class="widget-card" id="widgetCard">
        <div class="counter" id="cardCounter">0 / 0</div>
        <div class="deck-area" id="deckArea">
            <div class="fake-card fake-1"></div>
            <div class="fake-card fake-2"></div>
            <div class="card main-card" id="topCard">
                <div class="face front"></div>
                <div class="face back" id="cardBack"></div>
            </div>
        </div>
        <button class="btn-draw" id="drawBtn" onclick="drawCard()">Тянуть карту</button>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const configParam = urlParams.get('config');

// --- ЗВУКИ ---
let audioCtx = null;
function playSound(type) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type === 'flip') {
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else {
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i=0; i<data.length; i++) data[i] = Math.random()*2-1;
        const src = audioCtx.createBufferSource(); src.buffer = buffer;
        const low = audioCtx.createBiquadFilter(); low.type = 'lowpass'; low.frequency.value = 800;
        src.connect(low); low.connect(audioCtx.destination); src.start();
    }
}

// ==========================================
// ЛОГИКА ВИДЖЕТА
// ==========================================
if (configParam) {
    document.getElementById('widget-container').style.display = 'flex';
    let config = { items: [], c: '#8a2be2', tc: '#333', n: true };
    try { config = JSON.parse(decodeURIComponent(atob(configParam))); } catch(e){}

    document.documentElement.style.setProperty('--widget-color', config.c);
    document.documentElement.style.setProperty('--text-color', config.tc);
    if (config.n) {
        document.getElementById('widgetCard').style.boxShadow = `0 0 6cqmin ${config.c}`;
        document.getElementById('widgetCard').style.borderColor = config.c;
    }

    let allItems = config.items.length ? config.items : [{t:'text', v:'Пример'}];
    let deck = [];

    function initDeck() {
        deck = [...allItems].sort(() => Math.random() - 0.5);
        updateCounter();
        document.getElementById('drawBtn').innerText = "Тянуть карту";
    }

    function updateCounter() {
        document.getElementById('cardCounter').innerText = `${allItems.length - deck.length} / ${allItems.length}`;
    }

    window.drawCard = function() {
        if(document.getElementById('drawBtn').disabled) return;
        if(deck.length === 0) {
            document.getElementById('topCard').classList.remove('flipped');
            setTimeout(initDeck, 400); return;
        }

        document.getElementById('drawBtn').disabled = true;
        document.getElementById('topCard').classList.remove('flipped');

        setTimeout(() => {
            document.getElementById('deckArea').classList.add('shuffling');
            playSound('shuffle');
            setTimeout(() => {
                document.getElementById('deckArea').classList.remove('shuffling');
                const item = deck.pop();
                const back = document.getElementById('cardBack');
                if(item.t === 'img') back.innerHTML = `<img src="${item.v}">`;
                else back.innerHTML = `<span>${item.v}</span>`;
                
                document.getElementById('topCard').classList.add('flipped');
                playSound('flip');
                updateCounter();
                if(deck.length === 0) document.getElementById('drawBtn').innerText = "Собрать колоду";
                document.getElementById('drawBtn').disabled = false;
            }, 500);
        }, document.getElementById('topCard').classList.contains('flipped') ? 300 : 0);
    };
    initDeck();
} 
// ==========================================
// ЛОГИКА РЕДАКТОРА
// ==========================================
else {
    document.getElementById('editor-container').style.display = 'flex';
    let items = [{t:'text', v:'Яблоко'}, {t:'text', v:'Груша'}];

    function renderList() {
        const container = document.getElementById('card-list');
        container.innerHTML = '';
        items.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `
                <span style="font-size:12px;">${item.t === 'img' ? '🖼️' : '✍️'}</span>
                <input type="text" value="${item.v}" oninput="items[${i}].v = this.value; updateCode()">
                <button class="btn-del" onclick="items.splice(${i},1); renderList(); updateCode()">✕</button>
            `;
            container.appendChild(div);
        });
        updateCode();
    }

    window.addCardItem = () => { items.push({t:'text', v:''}); renderList(); };

    window.searchImages = async () => {
        const query = document.getElementById('pixSearch').value;
        if(!query) return;
        const res = await fetch(`https://pixabay.com/api/?key=43431100-348275e533c306d15b135905d&q=${encodeURIComponent(query)}&image_type=photo&per_page=12&lang=ru`);
        const data = await res.json();
        const container = document.getElementById('pixabay-results');
        container.innerHTML = '';
        data.hits.forEach(hit => {
            const img = document.createElement('img');
            img.src = hit.webformatURL;
            img.onclick = () => { items.push({t:'img', v: hit.webformatURL}); renderList(); };
            container.appendChild(img);
        });
    };

    function updateCode() {
        const config = { 
            items: items.filter(i => i.v), 
            c: document.getElementById('colorPicker').value, 
            tc: document.getElementById('textColorPicker').value,
            n: document.getElementById('neonToggle').checked 
        };
        const hash = btoa(encodeURIComponent(JSON.stringify(config)));
        const baseUrl = window.location.href.split('?')[0];
        document.getElementById('previewFrame').src = `${baseUrl}?config=${hash}`;
        document.getElementById('codeOutput').value = `<iframe src="${baseUrl}?config=${hash}" style="width:100%; max-width:450px; aspect-ratio:4/5; border:none; border-radius:15px;" frameborder="0" allowtransparency="true"></iframe>`;
    }

    document.querySelectorAll('input').forEach(el => el.oninput = updateCode);
    document.getElementById('copyBtn').onclick = () => {
        document.getElementById('codeOutput').select();
        document.execCommand('copy');
        alert('Код скопирован!');
    };

    renderList();
}
</script>
</body>
</html>
