<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Рандомайзер | Просто для учителя</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ РЕДАКТОРА
           ========================================= */
        :root {
            --bg: #f4f7f6;
            --text: #333;
            --primary: #8a2be2;
            --panel: #fff;
            --border: #ddd;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent; overflow: hidden;
        }

        #editor-container {
            display: none; background-color: var(--bg); color: var(--text);
            width: 100%; height: 100%; padding: 15px; box-sizing: border-box;
            overflow-y: auto; align-items: center; flex-direction: column;
        }
        .panel-box {
            max-width: 1100px; width: 100%; background: var(--panel);
            padding: 25px 35px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            box-sizing: border-box; margin-bottom: 20px;
        }
        h1 { text-align: center; margin: 0 0 20px; color: var(--primary); font-size: 26px; }
        
        .layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .controls { flex: 1.2; min-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .preview { flex: 1; min-width: 320px; display: flex; flex-direction: column; align-items: center; }

        /* Стили списка карточек */
        .card-list {
            border: 1px solid var(--border); border-radius: 12px;
            max-height: 200px; overflow-y: auto; padding: 10px; background: #fafafa;
        }
        .card-item {
            display: flex; align-items: center; gap: 10px; background: #fff;
            padding: 8px 12px; border-radius: 8px; margin-bottom: 8px;
            border: 1px solid #eee; font-size: 13px;
        }
        .card-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: contain; background: #f4f7f6; }
        .card-item .remove { margin-left: auto; color: #ff4757; cursor: pointer; font-weight: bold; }

        /* Ввод */
        .input-group { display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        input[type="text"], input[type="url"] {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); outline: none; font-size: 14px;
        }
        .btn-small {
            padding: 8px 15px; background: var(--primary); color: #fff; border: none;
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s;
        }
        .btn-small:hover { filter: brightness(1.1); }
        .btn-link { background: #20bf6b; }

        /* Поиск картинок с ползунком */
        .search-box { display: flex; gap: 8px; margin-top: 5px; }
        .search-results {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px;
            max-height: 200px; overflow-y: auto; padding: 8px; border: 1px solid var(--border);
            border-radius: 8px; background: #fff;
        }
        /* Кастомный красивый ползунок */
        .search-results::-webkit-scrollbar { width: 8px; }
        .search-results::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .search-results::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .search-results::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        .search-results img {
            width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 6px; 
            cursor: pointer; transition: 0.2s; background: #f4f7f6; border: 2px solid transparent;
        }
        .search-results img:hover { transform: scale(1.05); border-color: #ddd; }
        .search-results img.selected { border-color: var(--primary); transform: scale(0.95); }

        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; padding: 0;}
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 8px; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer;}
        
        button.action-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button.action-btn:hover { filter: brightness(1.1); }

        .preview-box {
            width: 100%; max-width: 400px; aspect-ratio: 4/5;
            border: 2px dashed var(--border); border-radius: 20px;
            background: #eee; position: relative; overflow: hidden; resize: both;
        }
        .preview-box iframe { width: 100%; height: 100%; border: none; }

        /* Футер */
        footer {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border);
            text-align: center; font-size: 13px; color: #777; width: 100%; max-width: 1100px;
        }
        .social-links { display: flex; gap: 20px; justify-content: center; margin-top: 10px; }
        .social-links a { color: #777; text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: 600; transition: 0.2s;}
        .social-links a:hover { color: var(--primary); }
        .social-links svg { width: 20px; height: 20px; fill: currentColor; }

           СТИЛИ ВИДЖЕТА (3D КАРТЫ)
           ========================================= */

            display: none; width
