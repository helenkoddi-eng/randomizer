<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Рандомайзер Карточек | Просто для учителя</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ РЕДАКТОРА
           ========================================= */
        :root {
            --bg: #f4f7f6;
            --text: #333;
            --primary: #8a2be2;
            --panel: #fff;
            --border: #ddd;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent; overflow: hidden;
        }

        #editor-container {
            display: none; background-color: var(--bg); color: var(--text);
            width: 100%; height: 100%; padding: 15px; box-sizing: border-box;
            overflow-y: auto; align-items: center; flex-direction: column;
        }
        .panel-box {
            max-width: 1100px; width: 100%; background: var(--panel);
            padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            box-sizing: border-box; margin-bottom: 20px;
        }
        h1 { text-align: center; margin: 0 0 20px; color: var(--primary); font-size: 24px; }
        
        .layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .controls { flex: 1.2; min-width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .preview { flex: 1; min-width: 320px; display: flex; flex-direction: column; align-items: center; }

        /* Стили списка карточек */
        .card-list {
            border: 1px solid var(--border); border-radius: 12px;
            max-height: 250px; overflow-y: auto; padding: 10px; background: #fafafa;
        }
        .card-item {
            display: flex; align-items: center; gap: 10px; background: #fff;
            padding: 8px 12px; border-radius: 8px; margin-bottom: 8px;
            border: 1px solid #eee; font-size: 13px;
        }
        .card-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .card-item .remove { margin-left: auto; color: #ff4757; cursor: pointer; font-weight: bold; }

        /* Поиск и ввод */
        .input-group { display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        .search-box { display: flex; gap: 8px; margin-top: 5px; }
        input[type="text"], input[type="url"] {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); outline: none; font-size: 14px;
        }
        .search-results {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px;
        }
        .search-results img {
            width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; 
            cursor: pointer; transition: 0.2s;
        }
        .search-results img:hover { transform: scale(1.05); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        .btn-small {
            padding: 8px 15px; background: var(--primary); color: #fff; border: none;
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
        }

        .preview-box {
            width: 100%; max-width: 400px; aspect-ratio: 4/5;
            border: 2px dashed var(--border); border-radius: 20px;
            background: #eee; position: relative; overflow: hidden; resize: both;
        }
        .preview-box iframe { width: 100%; height: 100%; border: none; }

        footer {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border);
            text-align: center; font-size: 13px; color: #777; width: 100%;
        }
        .social-links { display: flex; gap: 20px; justify-content: center; margin-top: 10px; }
        .social-links svg { width: 18px; height: 18px; fill: currentColor; }
        .social-links a { color: #777; text-decoration: none; display: flex; align-items: center; gap: 5px; }

        /* =========================================
           СТИЛИ ВИДЖЕТА (3D КАРТЫ)
           ========================================= */
        #widget-container {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center; 
            padding: 2vmin; box-sizing: border-box;
            container-type: size;
        }

        .widget-card {
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 0.5cqmin solid rgba(255, 255, 255, 0.3); border-radius: 4cqmin;
            padding: 5cqmin; box-sizing: border-box; width: 100%; height: 100%;
        }

        .deck-area {
            position: relative; width: 100%; flex: 1;
            display: flex; justify-content: center; align-items: center;
            perspective: 1500px; margin-bottom: 4cqmin;
        }

        .card {
            position: absolute; width: 55cqmin; height: 77cqmin;
            border-radius: 4cqmin; transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            box-shadow: 0 2cqmin 4cqmin rgba(0,0,0,0.3); z-index: 5;
        }

        .fake-card {
            position: absolute; width: 55cqmin; height: 77cqmin;
            border-radius: 4cqmin; background: #fff;
            box-shadow: 0 0.5cqmin 1cqmin rgba(0,0,0,0.2);
        }
        .fake-1 { transform: translate(-1cqmin, 1cqmin) rotate(-2deg); z-index: 1; }
        .fake-2 { transform: translate(1cqmin, 1.5cqmin) rotate(1deg); z-index: 2; }

        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 4cqmin;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 0.5cqmin solid rgba(255,255,255,0.8); background: #fff;
            gap: 2cqmin; padding: 3cqmin; box-sizing: border-box;
        }
        
        .face.front {
            background-color: var(--widget-color, #8a2be2);
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0, rgba(255,255,255,0.1) 2cqmin, transparent 2cqmin, transparent 4cqmin);
            transform: rotateY(0deg);
        }
        .face.front::after {
            content: '?'; font-size: 20cqmin; color: rgba(255,255,255,0.8); font-weight: 900;
        }

        .face.back {
            transform: rotateY(180deg); text-align: center;
        }
        .face.back img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; border-radius: 2cqmin; 
        }
        /* Если есть и текст и фото, уменьшаем фото */
        .face.back.has-both img { max-height: 60%; }
        
        .face.back span {
            font-size: 5.5cqmin; font-weight: 700; color: #333; 
            word-wrap: break-word; line-height: 1.2;
            max-width: 100%;
        }

        .card.flipped { transform: rotateY(180deg) scale(1.05); }

        .shuffling .fake-1 { animation: shuffleLeft 0.5s ease-in-out; }
        .shuffling .fake-2 { animation: shuffleRight 0.5s ease-in-out; }
        .shuffling .main-card { animation: shuffleTop 0.5s ease-in-out; }

        @keyframes shuffleLeft { 0%, 100% { transform: translate(-1cqmin, 1cqmin) rotate(-2deg); } 50% { transform: translate(-30cqmin, 5cqmin) rotate(-15deg); } }
        @keyframes shuffleRight { 0%, 100% { transform: translate(1cqmin, 1.5cqmin) rotate(1deg); } 50% { transform: translate(30cqmin, 0cqmin) rotate(10deg); } }
        @keyframes shuffleTop { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15cqmin) scale(1.05); } }

        .btn-draw {
            background: var(--widget-color, #8a2be2); color: white;
            border: none; border-radius: 2cqmin; padding: 3cqmin 6cqmin;
            font-size: 4.5cqmin; font-weight: 800; cursor: pointer;
            box-shadow: 0 1.5cqmin 3cqmin rgba(0,0,0,0.2); transition: 0.2s;
        }
        .counter {
            position: absolute; top: 3cqmin; right: 4cqmin;
            background: rgba(0,0,0,0.5); color: #fff; padding: 1cqmin 2cqmin;
            border-radius: 2cqmin; font-size: 3cqmin;
        }
    </style>
</head>
<body>

<!-- РЕДАКТОР -->
<div id="editor-container">
    <div class="panel-box">
        <h1>3D Рандомайзер Карточек</h1>
        <div class="layout">
            <div class="controls">
                
                <!-- Ручное добавление -->
                <div class="input-group">
                    <label style="font-size: 12px; color: #666;">Текст на карточке:</label>
                    <input type="text" id="textInput" placeholder="Например: Какое сегодня число?">
                    <label style="font-size: 12px; color: #666; margin-top: 5px;">Прямая ссылка на картинку (необязательно):</label>
                    <input type="url" id="linkInput" placeholder="https://example.com/photo.jpg">
                    <button class="btn-small" style="margin-top: 5px;" onclick="addManualCard()">Добавить карточку</button>
                </div>

                <!-- Поиск картинок Unsplash -->
                <div style="margin-top:10px;">
                    <label>Поиск картинок (Unsplash):</label>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Найти фото...">
                        <button class="btn-small" onclick="searchImages()">Найти</button>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>

                <!-- Список добавленных -->
                <label style="margin-top:10px; display:block;">Ваша колода:</label>
                <div id="cardList" class="card-list"></div>

                <div style="display:flex; gap:15px; align-items:center; margin-top:10px;">
                    <div style="flex:1">
                        <label>Цвет рубашки:</label>
                        <input type="color" id="colorPicker" value="#8a2be2" style="margin-top:5px;">
                    </div>
                    <label class="checkbox-group" style="flex:1; margin-top:20px;">
                        <input type="checkbox" id="neonToggle" checked> <span>Неон</span>
                    </label>
                </div>

                <button id="copyBtn" class="action-btn">Скопировать код iframe</button>
                <textarea id="codeOutput" style="height:60px; font-size:10px; margin-top:10px;" readonly></textarea>
            </div>
            
            <div class="preview">
                <label>Предпросмотр:</label>
                <div class="preview-box">
                    <iframe id="previewFrame"></iframe>
                </div>
            </div>
        </div>
        <footer>
            Автор: <b>Кóденцева Алёна</b>, блог <i>Просто для учителя</i>
            <div class="social-links">
                <a href="https://t.me/easyfrbusy" target="_blank">Telegram</a>
                <a href="https://vk.com/easyfrbusy" target="_blank">ВКонтакте</a>
            </div>
        </footer>
    </div>
</div>

<!-- ВИДЖЕТ -->
<div id="widget-container">
    <div class="widget-card" id="widgetCard">
        <div class="counter" id="cardCounter">0 / 0</div>
        <div class="deck-area" id="deckArea">
            <div class="fake-card fake-1"></div>
            <div class="fake-card fake-2"></div>
            <div class="card main-card" id="topCard">
                <div class="face front"></div>
                <div class="face back" id="cardBack"></div>
            </div>
        </div>
        <button class="btn-draw" id="drawBtn" onclick="drawCard()">Тянуть карту</button>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const configParam = urlParams.get('config');

let deckData = []; // [{text: '...', img: '...'}]

// --- ЗВУКИ ---
let audioCtx = null;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playShuffleSound() {
    if(!audioCtx) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.4, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0; i<buf.length; i++) data[i] = Math.random()*2-1;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const gain = audioCtx.createGain(); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.4);
    src.connect(gain); gain.connect(audioCtx.destination); src.start();
}
function playFlipSound() {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime+0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.2);
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.2);
}

// ==========================================
// ЛОГИКА ВИДЖЕТА
// ==========================================
if (configParam) {
    document.getElementById('widget-container').style.display = 'flex';
    let config = { d: [], c: '#8a2be2', n: true };
    try { config = JSON.parse(decodeURIComponent(atob(configParam))); } catch(e){}

    document.documentElement.style.setProperty('--widget-color', config.c);
    if(config.n) {
        const wc = document.getElementById('widgetCard');
        wc.style.boxShadow = `0 0 6cqmin ${config.c}, inset 0 1cqmin 3cqmin rgba(255,255,255,0.4)`;
        wc.style.borderColor = config.c;
    }

    let allCards = config.d;
    let remaining = [];
    const topCard = document.getElementById('topCard');
    const cardBack = document.getElementById('cardBack');
    const drawBtn = document.getElementById('drawBtn');
    const cardCounter = document.getElementById('cardCounter');

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initDeck() {
        remaining = shuffle([...allCards]);
        updateCounter();
        drawBtn.innerText = "Тянуть карту";
    }

    function updateCounter() {
        cardCounter.innerText = `${allCards.length - remaining.length} / ${allCards.length}`;
    }

    window.drawCard = function() {
        initAudio();
        if(remaining.length === 0) {
            topCard.classList.remove('flipped');
            setTimeout(initDeck, 400); return;
        }
        drawBtn.disabled = true;
        topCard.classList.remove('flipped');
        
        setTimeout(() => {
            document.getElementById('deckArea').classList.add('shuffling');
            playShuffleSound();
            setTimeout(() => {
                document.getElementById('deckArea').classList.remove('shuffling');
                const card = remaining.pop();
                
                // Рендерим содержимое
                let contentHtml = '';
                cardBack.className = 'face back';
                if(card.img && card.text) cardBack.classList.add('has-both');
                
                if(card.img) contentHtml += `<img src="${card.img}">`;
                if(card.text) contentHtml += `<span>${card.text}</span>`;
                
                cardBack.innerHTML = contentHtml;

                updateCounter();
                topCard.classList.add('flipped');
                playFlipSound();
                if(remaining.length === 0) drawBtn.innerText = "Собрать колоду";
                drawBtn.disabled = false;
            }, 500);
        }, topCard.classList.contains('flipped') ? 300 : 0);
    };
    initDeck();
} 
// ==========================================
// ЛОГИКА РЕДАКТОРА
// ==========================================
else {
    document.getElementById('editor-container').style.display = 'flex';
    
    window.addManualCard = function() {
        const textVal = document.getElementById('textInput').value.trim();
        const linkVal = document.getElementById('linkInput').value.trim();
        if(!textVal && !linkVal) return;
        
        deckData.push({text: textVal, img: linkVal});
        document.getElementById('textInput').value = '';
        document.getElementById('linkInput').value = '';
        renderList();
    };

    window.searchImages = async function() {
        const query = document.getElementById('searchInput').value.trim();
        if(!query) return;
        const resDiv = document.getElementById('searchResults');
        resDiv.innerHTML = 'Загрузка...';
        try {
            const response = await fetch(`https://api.unsplash.com/search/photos?query=${query}&per_page=8&client_id=896d4f52c589547b213459951660207a1ad39992314a7e77a985afe063920958`);
            const data = await response.json();
            resDiv.innerHTML = '';
            data.results.forEach(img => {
                const el = document.createElement('img');
                el.src = img.urls.small;
                el.onclick = () => {
                    deckData.push({text: '', img: img.urls.regular});
                    renderList();
                };
                resDiv.appendChild(el);
            });
        } catch(e) { resDiv.innerHTML = 'Ошибка поиска'; }
    };

    function renderList() {
        const list = document.getElementById('cardList');
        list.innerHTML = '';
        deckData.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'card-item';
            
            let preview = '';
            if(item.img) preview += `<img src="${item.img}">`;
            let textSnippet = item.text ? (item.text.substring(0, 20) + (item.text.length > 20 ? '...' : '')) : 'Без текста';
            
            div.innerHTML = `${preview} <span>${textSnippet}</span>`;
            
            const rem = document.createElement('span');
            rem.className = 'remove'; rem.innerText = '✕';
            rem.onclick = () => { deckData.splice(i, 1); renderList(); };
            div.appendChild(rem);
            list.appendChild(div);
        });
        updateCode();
    }

    function updateCode() {
        const config = { d: deckData, c: document.getElementById('colorPicker').value, n: document.getElementById('neonToggle').checked };
        const hash = btoa(encodeURIComponent(JSON.stringify(config)));
        const url = window.location.href.split('?')[0] + '?config=' + hash;
        document.getElementById('previewFrame').src = url;
        document.getElementById('codeOutput').value = `<iframe src="${url}" style="width:100%; max-width:450px; aspect-ratio:4/5; border:none; border-radius:12px;" frameborder="0" allowtransparency="true"></iframe>`;
    }

    document.getElementById('colorPicker').oninput = updateCode;
    document.getElementById('neonToggle').onchange = updateCode;
    document.getElementById('copyBtn').onclick = () => {
        document.getElementById('codeOutput').select();
        document.execCommand('copy');
        alert('Код скопирован!');
    };
    
    // Начальные данные
    deckData = [
        {text: 'Случайный вопрос?', img: ''},
        {text: '', img: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=400&q=80'}
    ];
    renderList();
}
</script>
</body>
</html>
